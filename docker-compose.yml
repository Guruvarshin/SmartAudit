services:
  mongo:
    image: mongo:7
    container_name: smartaudit-mongo
    command: ["--replSet", "rs0", "--bind_ip_all", "--port", "27017"]
    ports:
 - "27017:27017"
    volumes:
 - smartaudit-mongo-data:/data/db
    # Single-node replica set. The member host is pinned to localhost:27017
    # deliberately: a replica set advertises its members' hostnames to clients,
    # and if it advertised the container's internal hostname the driver would
    # connect and then hang on the first write when run from the host machine.
    # The initiate is idempotent, so `docker compose up` is safe to re-run.
    healthcheck:
      test: >
        mongosh --quiet --eval "
          try {
            rs.status().ok
          } catch (e) {
            rs.initiate({
              _id: 'rs0',
              members: [{ _id: 0, host: 'localhost:27017' }]
            }).ok
          }
        "
      interval: 5s
      timeout: 10s
      retries: 30
      start_period: 5s

volumes:
  smartaudit-mongo-data:
